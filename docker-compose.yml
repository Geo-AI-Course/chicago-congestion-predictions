services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: congestion_postgis
    environment:
      POSTGRES_DB: congestion
      POSTGRES_USER: congestion
      POSTGRES_PASSWORD: congestion
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U congestion -d congestion"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgis_data:
